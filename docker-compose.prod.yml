# Docker Compose - 生产环境
services:
  # MySQL 数据库（生产）
  mysql:
    image: mysql:8.0
    platform: linux/amd64
    container_name: bitcoin_mysql_prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: bitcoin_mining_master
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: UTC
    ports:
      - "127.0.0.1:3306:3306"  # 只监听本地，通过SSH隧道访问
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backup:/backup  # 备份目录
    networks:
      - bitcoin_network
    command: --default-authentication-plugin=mysql_native_password --max-connections=500 --default-time-zone=+00:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Redis 缓存（生产）
  redis:
    image: redis:6-alpine
    container_name: bitcoin_redis_prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - bitcoin_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Node.js 后端服务（生产）
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bitcoin_backend_prod
    restart: always
    environment:
      NODE_ENV: production
      PORT: 8888
      TZ: UTC
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: bitcoin_mining_master
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      APPLE_IAP_SHARED_SECRET: ${APPLE_IAP_SHARED_SECRET}
      # Firebase FCM 推送通知（从 Firebase Console → 项目设置 → 服务账号 → 生成新私钥 获取 JSON，压缩为单行填入 .env）
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-bitcoin-mining-master-24993}
      LOG_LEVEL: info
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bitcoin_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8888/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Web 管理后台（生产）
  web_frontend:
    build:
      context: ./web_frontend
      dockerfile: Dockerfile
    container_name: bitcoin_web_prod
    restart: always
    networks:
      - bitcoin_network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # Nginx 反向代理（生产）
  nginx:
    image: nginx:alpine
    container_name: bitcoin_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
      - ./nginx/website:/usr/share/nginx/website:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
      web_frontend:
        condition: service_started
    networks:
      - bitcoin_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  bitcoin_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  nginx_logs:
