# Bitcoin Mining Master - 本地开发环境 Nginx 配置
# 用于代理本地 Node.js 后端（pm2 运行在 8888 端口）

server {
    listen       80;
    server_name  localhost 127.0.0.1;

    # 访问日志
    access_log  /opt/homebrew/var/log/nginx/bitcoin-mining-access.log;
    error_log   /opt/homebrew/var/log/nginx/bitcoin-mining-error.log;

    # 客户端请求体大小限制（支持文件上传）
    client_max_body_size 20M;

    # API 反向代理到本地后端服务（pm2 运行在 8888 端口）
    location /api/ {
        # 代理到本地 Node.js 服务
        proxy_pass http://127.0.0.1:8888;
        
        # HTTP 版本
        proxy_http_version 1.1;
        
        # WebSocket 支持（如需实时通信）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # 传递原始请求头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 禁用缓存（开发环境）
        proxy_cache_bypass $http_upgrade;
        proxy_no_cache 1;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 健康检查端点（不记录日志）
    location /api/health {
        access_log off;
        proxy_pass http://127.0.0.1:8888;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 前端静态资源（如有）
    location / {
        # 如果有编译好的前端，指向前端构建目录
        # root /Users/davidpony/Desktop/工程文件夹/Bitcoin_Mining_Master/web_frontend/build;
        # try_files $uri $uri/ /index.html;
        
        # 临时返回简单页面
        return 200 'Bitcoin Mining Master API Proxy - Use /api/* endpoints\n';
        add_header Content-Type text/plain;
    }

    # Gzip 压缩（提升性能）
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss;
}
