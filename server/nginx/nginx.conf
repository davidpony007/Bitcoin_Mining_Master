# Nginx反向代理配置示例
# 详细说明：
# - listen: 监听端口
# - server_name: 绑定域名
# - location /api/: 代理API请求到后端服务
# - proxy_pass: 代理目标地址
# - proxy_set_header: 设置转发请求头，保留原始信息
# - HTTPS配置: 取消注释可启用SSL证书
# Nginx 生产级配置 - Bitcoin Mining Master
# 职责：反向代理、负载均衡、限流、静态资源、SSL 终结

user nginx;
worker_processes auto;  # 自动匹配 CPU 核心数
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;  # 每个 worker 的最大连接数
    use epoll;  # Linux 高性能事件模型
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # 性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;  # 允许上传文件最大 20MB

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;

    # 限流区域定义（按 IP）
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;  # API 每分钟 60 次
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m; # 登录每分钟 5 次
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;           # 并发连接限制

    # 后端 Node.js 实例（负载均衡池）
    upstream backend_nodes {
        least_conn;  # 最少连接数算法
        server 127.0.0.1:8888 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:8889 max_fails=3 fail_timeout=30s;
        # 生产环境可扩展更多实例
        keepalive 32;  # 保持长连接
    }

    # HTTP 服务器（重定向到 HTTPS）
    server {
        listen 80;
        server_name your-domain.com www.your-domain.com;  # 替换为实际域名

        # ACME 证书验证路径（Let's Encrypt）
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 其他请求重定向到 HTTPS
        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    # HTTPS 服务器
    server {
        listen 443 ssl http2;
        server_name your-domain.com www.your-domain.com;

        # SSL 证书配置（生产需替换）
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # 安全头
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # 前端静态资源（React/Vue 构建产物）
        location / {
            root /var/www/bitcoin-mining-master/web_frontend/build;
            try_files $uri $uri/ /index.html;
            expires 1d;
            add_header Cache-Control "public, immutable";
        }

        # API 反向代理（带限流）
        location /api/ {
            limit_req zone=api_limit burst=10 nodelay;  # 允许突发 10 个请求
            limit_conn conn_limit 10;  # 单 IP 最多 10 个并发连接

            proxy_pass http://backend_nodes;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # 超时设置
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # 登录接口（更严格限流）
        location /api/auth/login {
            limit_req zone=login_limit burst=2 nodelay;

            proxy_pass http://backend_nodes;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 健康检查（不限流）
        location /api/health {
            access_log off;
            proxy_pass http://backend_nodes;
            proxy_set_header Host $host;
        }

        # 静态文件缓存（图片、字体等）
        location ~* \.(jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
            root /var/www/bitcoin-mining-master/web_frontend/build;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}
