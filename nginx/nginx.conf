user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;

    # 上游后端服务
    upstream backend {
        server backend:8888;
        keepalive 32;
    }

    # 上游 Web 管理后台
    upstream web_frontend {
        server web_frontend:80;
        keepalive 16;
    }

    # HTTP 服务器 — 全部强制跳转 HTTPS
    server {
        listen 80;
        server_name smartearningtool.top www.smartearningtool.top;

        # Let's Encrypt ACME 验证（申请/续期证书时使用）
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 其余 HTTP 请求强制 301 跳转到 HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS 服务器
    server {
        listen 443 ssl http2;
        server_name smartearningtool.top www.smartearningtool.top;

        # ---- SSL 证书 ----
        ssl_certificate     /etc/nginx/ssl/certificate.crt;
        ssl_certificate_key /etc/nginx/ssl/private.key;

        # ---- TLS 协议与加密套件（Mozilla Intermediate 推荐配置）----
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;

        # ---- 安全响应头 ----
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;

        # 客户端最大上传大小
        client_max_body_size 10M;

        # ---- API 代理 ----
        location /api/ {
            proxy_pass http://backend/api/;
            proxy_http_version 1.1;

            # WebSocket 支持
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # 代理头设置
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # 缓冲设置
            proxy_buffering         off;
            proxy_request_buffering off;
        }

        # ---- 健康检查端点 ----
        location /health {
            proxy_pass http://backend/api/health;
            access_log off;
        }

        # ---- ping 探测（容器 healthcheck 使用）----
        location /ping {
            proxy_pass http://backend/api/health;
            access_log off;
        }

        # ---- Web 管理后台（所有非 /api 请求代理到 web_frontend 容器）----
        location / {
            proxy_pass http://web_frontend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_read_timeout    30s;
        }

        # ---- 错误页面 ----
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            return 503 '{"error":"Service temporarily unavailable"}';
            add_header Content-Type application/json;
        }
    }
}
