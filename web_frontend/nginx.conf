server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        font/truetype font/opentype application/vnd.ms-fontobject
        image/svg+xml;

    # 静态资源强缓存（带 hash 的文件永不过期）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
        access_log off;
    }

    # /data-system/assets/ 优先匹配（^~ 阻止正则），alias 到真实 assets 目录
    location ^~ /data-system/assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA 路由回退 —— /data-system/ 子路径均回退到主入口 index.html
    location ^~ /data-system/ {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # 健康检查（供 Docker healthcheck 使用）
    location /ping {
        return 200 "pong";
        add_header Content-Type text/plain;
        access_log off;
    }
}
